name: Build Unsigned iOS IPA

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest # 必须用 macOS 环境

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.84.1

      - name: Add iOS targets to Rust
        run: rustup target add aarch64-apple-ios x86_64-apple-ios

      - name: Tauri iOS init
        run: | 
          npm install -g bun
          bun install
          bun tauri ios init
          bun tauri icon

      - name: Build Unsigned Archive via Tauri
        env:
          CODE_SIGNING_ALLOWED: "NO"      # 强制 Xcode 不签名
          CODE_SIGNING_REQUIRED: "NO"     # 强制 Xcode 不要求签名
        run: bun tauri ios build

      - name: Package Unsigned .ipa
        run: |
          ARCHIVE_PATH=$(find src-tauri -name "*.xcarchive" | head -n 1)
          echo "Found archive at: $ARCHIVE_PATH"
          mkdir -p Payload
          cp -R "$ARCHIVE_PATH/Products/Applications/"*.app Payload/
          zip -r MyApp.unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-unsigned-ipa
          path: MyApp.unsigned.ipa
